<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 20" preserveAspectRatio="none">
  <rect width="30" height="20" fill="#fff"/>
  <!-- Simplified Taegukgi: red+blue yin-yang circle in the centre.
