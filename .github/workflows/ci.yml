# CI/CD (M5) — tests + build + audits on every push/PR; on the `cloud` branch
# it also builds the arm64 image, pushes it to GHCR and bumps the GitOps tag.
#
# Deploys are PULL-based on purpose: the k3s API (6443) is NSG-allowlisted to
# the owner's IP, so CI *cannot* reach the cluster — instead ArgoCD (running
# inside the cluster) watches this repo and applies the bumped tag. CI's only
# "deploy" action is the values-oci.yaml commit.
name: ci

on:
  push:
    branches: [cloud, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: backend — ruff + pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - name: install (locked, incl. dev)
        run: uv sync --frozen
      - name: ruff
        run: uv run ruff check .
      - name: pytest (network-guarded suite)
        run: uv run pytest tests/ -q

  frontend:
    name: frontend — tsc + vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  audit:
    name: dependency audit (report-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: pip-audit (backend runtime deps)
        working-directory: backend
        continue-on-error: true
        run: |
          uv export --frozen --no-dev --format requirements-txt -o requirements-audit.txt
          uvx pip-audit -r requirements-audit.txt
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: npm audit (frontend)
        working-directory: frontend
        continue-on-error: true
        run: npm audit --audit-level=high

  image:
    name: arm64 image → GHCR + trivy
    if: github.event_name == 'push' && github.ref == 'refs/heads/cloud'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/milomitic/finance-alert:${{ github.sha }}
            ghcr.io/milomitic/finance-alert:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: trivy image scan (report-only for now)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/milomitic/finance-alert:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "0"

  bump:
    name: gitops — bump image tag
    if: github.event_name == 'push' && github.ref == 'refs/heads/cloud'
    needs: image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cloud
      - name: point values-oci.yaml at the new image
        run: |
          sed -i 's/^  tag: .*/  tag: "${{ github.sha }}"/' charts/finance-alert/values-oci.yaml
          if git diff --quiet; then
            echo "tag already current — nothing to bump"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add charts/finance-alert/values-oci.yaml
          git commit -m "chore(cd): image ${{ github.sha }} [skip ci]"
          git push origin cloud
