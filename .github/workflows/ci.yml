# CI/CD (M5) — tests + build + audits on every push/PR; on the `cloud` branch
# it also builds the arm64 image, pushes it to GHCR and bumps the GitOps tag.
#
# Deploys are PULL-based on purpose: the k3s API (6443) is NSG-allowlisted to
# the owner's IP, so CI *cannot* reach the cluster — instead ArgoCD (running
# inside the cluster) watches this repo and applies the bumped tag. CI's only
# "deploy" action is the values-oci.yaml commit.
name: ci

on:
  push:
    branches: [cloud, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: backend — ruff + pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - name: install (locked, incl. dev)
        run: uv sync --frozen
      # Staged ruff adoption: the project's full config was never enforced and
      # has ~400 pre-existing style findings (E501/I001/N8xx…). CI gates on the
      # fatal set (syntax errors + undefined names) so real breakage fails fast;
      # full-config adoption is a tracked backlog item, not a silent skip.
      - name: ruff (fatal gate)
        run: uv run ruff check app tests --select E9,F63,F7,F82
      - name: pytest (network-guarded suite)
        run: uv run pytest tests/ -q

  backend-postgres:
    name: backend — real-Postgres portability (M7)
    # Proves the migrated json_text() queries and the whole schema work on a REAL
    # Postgres, not merely that the SQL compiles. Its own gate (a regression here
    # goes red and visible) but deliberately OFF the image/bump needs-chain: the
    # cloud DB stays SQLite until the M7-P4 cutover, so this must not block the
    # SQLite-safe deploy — same rationale as the report-only `audit` job.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fa
          POSTGRES_PASSWORD: fa
          POSTGRES_DB: fa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # psycopg3 driver (added to runtime deps for the P4 cutover); the module is
      # skipped whenever this var is unset (every other job and all local runs).
      TEST_DATABASE_URL: postgresql+psycopg://fa:fa@localhost:5432/fa_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - name: install (locked, incl. dev)
        run: uv sync --frozen
      - name: pytest (real-Postgres lane)
        run: uv run pytest tests/test_postgres_integration.py -v

  frontend:
    name: frontend — tsc + vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  audit:
    name: dependency audit (fails on a known CVE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      # NOT continue-on-error any more. It used to be, and that is exactly why
      # 18 known CVEs (6 in starlette, the ASGI layer under FastAPI) sat in the
      # lockfile unnoticed: the job printed them and went green. An audit that
      # can never fail is decorative. This job does NOT gate deploys — `image`
      # needs [backend, frontend], not [audit] — so a new advisory turns CI red
      # and visible without blocking a release.
      - name: pip-audit (backend runtime deps)
        working-directory: backend
        run: |
          uv export --frozen --no-dev --format requirements-txt -o requirements-audit.txt
          uvx pip-audit -r requirements-audit.txt
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: npm audit (frontend)
        working-directory: frontend
        run: npm audit --audit-level=high

  image:
    name: arm64 image → GHCR
    if: github.event_name == 'push' && github.ref == 'refs/heads/cloud'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/milomitic/finance-alert:${{ github.sha }}
            ghcr.io/milomitic/finance-alert:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  image-scan:
    name: trivy image scan (fails on FIXABLE critical/high)
    if: github.event_name == 'push' && github.ref == 'refs/heads/cloud'
    needs: image
    runs-on: ubuntu-latest
    steps:
      # Its own job, like `audit`: a real gate (a fixable CRITICAL/HIGH in the
      # image turns CI red and visible) but deliberately OFF the bump chain, so a
      # scan finding does not block a release. `--ignore-unfixed` is the crux:
      # base-image OS CVEs with no upstream fix yet would otherwise red the
      # pipeline forever, which trains everyone to ignore it (exactly how the
      # pip/npm audit rotted). We only fail on things we can actually act on.
      - name: trivy
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_PLATFORM: linux/arm64
        with:
          image-ref: ghcr.io/milomitic/finance-alert:${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  bump:
    name: gitops — bump image tag
    if: github.event_name == 'push' && github.ref == 'refs/heads/cloud'
    needs: image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cloud
          fetch-depth: 0
      - name: point values-oci.yaml at the new image
        run: |
          sed -i 's/^  tag: .*/  tag: "${{ github.sha }}"/' charts/finance-alert/values-oci.yaml
          if git diff --quiet; then
            echo "tag already current — nothing to bump"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add charts/finance-alert/values-oci.yaml
          git commit -m "chore(cd): image ${{ github.sha }} [skip ci]"
          # Robust push: HEAD:cloud (checkout leaves a detached HEAD), and retry
          # — a transient GitHub "remote: fatal error in commit_refs" rejected
          # this step twice, and a concurrent push would need a rebase.
          for i in 1 2 3 4 5; do
            if git push origin HEAD:cloud; then exit 0; fi
            echo "push attempt $i failed — refetch/rebase and retry"
            git fetch origin cloud && git rebase origin/cloud || true
            sleep $((i * 5))
          done
          echo "::error::bump push failed after 5 attempts"; exit 1
