# kube-prometheus-stack (Prometheus + Grafana + Alertmanager + node-exporter +
# kube-state-metrics), sized for a SHARED Always-Free A1 VM (2 OCPU / 12 GB)
# that already runs the app + ArgoCD. Everything is deliberately small: short
# retention, modest limits, 60s scrape.
#
# Install:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm upgrade --install kps prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace -f this-file \
#     --set grafana.adminPassword=<random>
fullnameOverride: kps

# k3s bundles the control plane into one process and does NOT expose these as
# scrape targets → disable their ServiceMonitors so we don't get permanently
# "down" targets cluttering the alerts.
kubeControllerManager: { enabled: false }
kubeScheduler: { enabled: false }
kubeProxy: { enabled: false }
kubeEtcd: { enabled: false }

prometheusOperator:
  resources:
    requests: { cpu: 20m, memory: 96Mi }
    limits: { memory: 256Mi }

prometheus:
  prometheusSpec:
    retention: 3d
    retentionSize: "2GB"
    scrapeInterval: 60s
    evaluationInterval: 60s
    resources:
      requests: { cpu: 100m, memory: 320Mi }
      limits: { memory: 900Mi }
    # Discover ServiceMonitors/PodMonitors from ALL namespaces (incl. the app's
    # in finance-alert), not just ones carrying this release's label.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: [ReadWriteOnce]
          resources: { requests: { storage: 3Gi } }

alertmanager:
  alertmanagerSpec:
    retention: 48h
    resources:
      requests: { cpu: 10m, memory: 32Mi }
      limits: { memory: 96Mi }
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: [ReadWriteOnce]
          resources: { requests: { storage: 1Gi } }

grafana:
  # adminPassword injected at install via --set (kept out of git).
  defaultDashboardsTimezone: browser
  # Loki datasource is NOT added here: loki-stack ships its own labelled
  # ConfigMap that Grafana's sidecar auto-loads. Adding it here too created a
  # duplicate "Loki" that made provisioning skip both.
  resources:
    requests: { cpu: 20m, memory: 64Mi }
    limits: { memory: 192Mi }
  persistence:
    enabled: true
    storageClassName: local-path
    size: 1Gi
  # M4: HTTPS on a real hostname. Two earlier notes here were WRONG and had to go:
  #  1. "the ISP's RPZ blocks nip.io/sslip.io" — an nslookup suffix-search
  #     artifact, not a block. 80-225-80-141.sslip.io resolves to the VM fine.
  #  2. "port 80 is NSG-allowlisted" — NO LONGER TRUE. :80 is now open to the
  #     whole internet so Let's Encrypt can fetch the ACME challenge, which
  #     briefly left this path-based Grafana PUBLICLY reachable. Hence the
  #     websecure-only annotations below: Grafana must be served exclusively on
  #     :443, which IS still allowlisted. Never serve anything but ACME on :80.
  # serve_from_sub_path keeps Grafana under /grafana; Traefik prefers the longer
  # path prefix, so /grafana reaches Grafana and / still reaches the app.
  "grafana.ini":
    server:
      domain: 80-225-80-141.sslip.io
      root_url: "%(protocol)s://%(domain)s/grafana"
      serve_from_sub_path: true
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      # :443 only — :443 stays NSG-allowlisted to the owner's IP, :80 does not.
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    path: /grafana
    pathType: Prefix
    hosts:
      - 80-225-80-141.sslip.io
    tls:
      - hosts:
          - 80-225-80-141.sslip.io
        secretName: grafana-tls
  # Loki datasource is provisioned via a labeled ConfigMap (loki-datasource.*).

prometheus-node-exporter:
  resources:
    requests: { cpu: 10m, memory: 24Mi }
    limits: { memory: 64Mi }

kube-state-metrics:
  resources:
    requests: { cpu: 10m, memory: 32Mi }
    limits: { memory: 128Mi }
