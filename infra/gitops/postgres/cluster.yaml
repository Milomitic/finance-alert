# CloudNativePG Cluster — the finance-alert Postgres (M7-P2).
#
# Single instance: HA needs >=2 nodes; the free-tier has one A1 VM, so a
# replica would just co-locate and buy nothing. Durability comes from the PVC
# (block volume) + WAL archiving to Object Storage (added in the P2 WAL step).
#
# Sizing is deliberately small for the shared 12 GB node (app + kube-prometheus
# + Loki already at ~46% live). shared_buffers stays at 128 MB instead of the
# textbook 25%-of-RAM precisely because the RAM is shared. The 768 Mi limit
# leaves headroom for the P3 bulk COPY (1M+ ohlcv rows) without OOM.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg
  namespace: finance-alert
  labels:
    app.kubernetes.io/part-of: finance-alert
spec:
  instances: 1
  # PG16 (matches the CI test lane). arm64 variant verified on GHCR.
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  primaryUpdateStrategy: unsupervised

  # OCI Object Storage's S3-compatible API rejects the AWS SDK's default
  # streaming/chunked payload signing + trailing checksums (boto3 >= 1.36):
  # "NotImplemented: AWS chunked encoding not supported". Force the SDK to
  # compute checksums only WHEN_REQUIRED so barman-cloud sends plain PUTs.
  env:
    - name: AWS_REQUEST_CHECKSUM_CALCULATION
      value: WHEN_REQUIRED
    - name: AWS_RESPONSE_CHECKSUM_VALIDATION
      value: WHEN_REQUIRED

  storage:
    size: 5Gi
    storageClass: local-path

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      # no cpu limit — let it burst on the 2-vCPU node; cap memory to protect
      # the co-tenant app + observability from a runaway query.
      memory: 768Mi

  postgresql:
    parameters:
      shared_buffers: "128MB"
      max_connections: "50"      # app pool + migration + a spare; plenty
      work_mem: "8MB"
      maintenance_work_mem: "64MB"

  # Least-privilege bootstrap: create the app database owned by a NON-superuser
  # role (fa_app). CNPG keeps the postgres superuser password-less/no external
  # login by default (enableSuperuserAccess unset), so fa_app is the only
  # externally-reachable identity. CNPG auto-generates the Secret `pg-app`
  # (username/password/dbname/host/port/uri) that the app consumes at cutover.
  bootstrap:
    initdb:
      database: finance_alert
      owner: fa_app

  # Point-in-time recovery: continuous WAL archiving + base backups to OCI
  # Object Storage via its S3-compatible API (barman-cloud). Credentials live in
  # the pg-wal-s3 Secret — an OCI Customer Secret Key created out-of-band, NEVER
  # in git. OCI's S3 endpoint is per-tenancy-namespace (axaqdeicu0wx) + region.
  backup:
    retentionPolicy: "7d"
    barmanObjectStore:
      destinationPath: s3://finance-alert-backups/
      endpointURL: https://axaqdeicu0wx.compat.objectstorage.eu-milan-1.oraclecloud.com
      s3Credentials:
        accessKeyId:
          name: pg-wal-s3
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: pg-wal-s3
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
