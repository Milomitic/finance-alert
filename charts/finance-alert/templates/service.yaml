{{- /*
ClusterIP Service: a stable in-cluster DNS name + virtual IP that load-balances
to the pod(s) matching the selector. For M2 we reach it via `kubectl
port-forward svc/...`; M4 puts an Ingress in front of it.

A StatefulSet also wants a *headless* Service (clusterIP: None) to give each
pod a stable DNS name — with a single replica it's not strictly needed, but
it's the canonical pairing, so we declare it too.
*/ -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "finance-alert.fullname" . }}
  labels:
    {{- include "finance-alert.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "finance-alert.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "finance-alert.fullname" . }}-headless
  labels:
    {{- include "finance-alert.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "finance-alert.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
