{{- /*
Dev-only Secret for the local kind cluster. In real clusters set
`secret.create=false` + `secret.existingSecret=<name>` so the value is
managed outside git (Sealed Secrets / External Secrets — M7+).
Helm stores Secret string data base64-encoded; `stringData` lets us write it
in the clear and lets Helm encode it.
*/ -}}
{{- if .Values.secret.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "finance-alert.secretName" . }}
  labels:
    {{- include "finance-alert.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.secret.secretKey | quote }}
{{- end -}}
