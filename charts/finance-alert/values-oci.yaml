# Overrides for the single-node k3s VM on OCI Always Free (2 OCPU / 12 GB).
# This file is the GITOPS SOURCE OF TRUTH: ArgoCD renders the chart with it on
# every sync. CI's bump job rewrites `image.tag` after each green build on the
# `cloud` branch — do not hand-edit the tag.

image:
  # GHCR, public package → the node pulls anonymously (OCIR is 403 on a pure
  # Always-Free tenancy). The tag below is stamped by CI (full commit sha).
  repository: ghcr.io/milomitic/finance-alert
  tag: "9357423126f17fe7f7410dbabe1f45102aedd9de"
  pullPolicy: IfNotPresent

persistence:
  storageClass: local-path # k3s' built-in Rancher local-path provisioner
  size: 4Gi

# App on a 2 OCPU / 12 GB node, leaving headroom for k3s + ArgoCD + the OS.
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1500m"
    memory: 2Gi

# Cloud DB migrates on image upgrades; give startup room.
probes:
  startupSeconds: 120
  periodSeconds: 10

# Traefik (bundled with k3s) fronts the app on the VM's public IP:80.
ingress:
  enabled: true
  className: traefik
  # M4: a real hostname, for free. sslip.io is a public wildcard DNS service that
  # answers <dashed-ip>.sslip.io with that IP — so this resolves to the VM with
  # nothing to buy or configure. (An earlier session wrongly believed the ISP's
  # RPZ blocked sslip.io; that was an nslookup suffix-search artifact.)
  # NOTE: setting a host means the raw-IP URL no longer matches this router —
  # use https://80-225-80-141.sslip.io/ from now on. TLS certs are per-NAME, so
  # a hostname is the price of HTTPS.
  host: "80-225-80-141.sslip.io"
  path: /
  pathType: Prefix
  annotations:
    # Production. Staging went first and issued cleanly (2026-07-16), proving the
    # ACME + HTTP-01 + Traefik + sslip.io chain end-to-end, so production's real
    # rate limits are only spent on a setup already known to work.
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Serve the app ONLY on :443. Port 80 is open to the internet purely so
    # Let's Encrypt can fetch the ACME challenge (cert-manager puts a temporary
    # ingress there); the app must not answer on it.
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  tls:
    - hosts:
        - 80-225-80-141.sslip.io
      secretName: finance-alert-tls

# The Secret is NOT managed by the chart in the cloud: ArgoCD renders from git
# only, and committing key material is out of the question. A durable Secret
# (`finance-alert-prod`: SECRET_KEY + ADMIN_PASSWORD_HASH) is created once on
# the cluster (see docs/cloud/ROADMAP.md M5); the chart just references it.
# Real HTTPS terminates at Traefik (M4, Let's Encrypt), so the session cookie
# can finally carry `Secure` — until now app_env stayed "development" purely
# because a Secure cookie over plain HTTP would never be sent back.
config:
  appEnv: "production"
  # Pinned to the real hostname. Safe now: the app's validate_host middleware
  # EXEMPTS /api/health + /metrics, the only endpoints in-cluster clients
  # (kubelet probes, Prometheus) reach by pod IP. An earlier attempt to pin this
  # with a bare TrustedHostMiddleware — which validates every path — 400'd those
  # probes and took the app down; see app/main.py.
  allowedHosts: "80-225-80-141.sslip.io"

secret:
  create: false
  existingSecret: "finance-alert-prod"

# M7 Postgres cutover switch (P4). false = the app uses its embedded SQLite on
# the PVC; true = it reads/writes the CloudNativePG cluster via the URI in the
# operator-generated Secret below. Flipping this is the whole cutover — and the
# rollback, since the migration only ever READ the SQLite file.
postgres:
  enabled: true    # M7-P4: CUT OVER — the app now reads/writes CloudNativePG
  secretName: pg-app

# M7-P4 cutover: temporarily 0 to stop writes while the final SQLite->Postgres
# migration runs; restored to 1 in the same cutover.
replicaCount: 1
